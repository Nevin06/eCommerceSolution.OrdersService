services:
  ordersmicroservice.api:
    image: ordersmicroserviceapi
    build:
      context: .
      dockerfile: OrdersMicroService.API/Dockerfile
    environment:
     - ASPNETCORE_ENVIRONMENT=Development
     - MONGODB_HOST=mongodb-container
     - MONGODB_PORT=27017
     - MONGODB_DATABASE=OrdersDatabase
     # - UsersMicroserviceName=users-microservice
     - UsersMicroserviceName=apigateway
     # - UsersMicroservicePort=9090
     - UsersMicroservicePort=8080
     # - ProductsMicroserviceName=products-microservice
     # - ProductsMicroservicePort=8080
     - ProductsMicroserviceName=apigateway
     - ProductsMicroservicePort=8080
     - REDIS_HOST=redis-container
     - REDIS_PORT=6379
     - RABBITMQ_HOST=rabbitmq-container
     - RABBITMQ_USERNAME=user
     - RABBITMQ_PASSWORD=password
     - RABBITMQ_PORT=5672
     - RABBITMQ_PRODUCTS_EXCHANGE=products.exchange
    ports:
     - "7001:8080"
    networks:
     - orders-mongodb-network
     - ecommerce-network
    depends_on:
     - mongodb-container

  mongodb-container:
    image: mongo:latest

    ports:
     - "27017:27017"
    volumes:
     - ../107/mongodb-init:/docker-entrypoint-initdb.d
    networks:
     - orders-mongodb-network

  products-microservice:
   image: products-microservice:latest
   environment:
     - ASPNETCORE_HTTP_PORTS=8080
     - ASPNETCORE_ENVIRONMENT=Development
     - MYSQL_HOST=mysql-container
     - MYSQL_PORT=3306
     - MYSQL_DATABASE=ecommerceproductsdatabase
     - MYSQL_USER=root 
     - MYSQL_PASSWORD=test
     - RABBITMQ_HOST=rabbitmq-container
     - RABBITMQ_USERNAME=user
     - RABBITMQ_PASSWORD=password
     - RABBITMQ_PORT=5672
     - RABBITMQ_PRODUCTS_EXCHANGE=products.exchange
   ports:
    - "6001:8080"
   networks:
     - products-mysql-network
     - ecommerce-network
   depends_on:
     - mysql-container

  mysql-container:
   image: mysql:latest
   environment:
   - MYSQL_ROOT_PASSWORD=test
   ports:
   - "3307:3306"
   volumes:
   - "../73/products:/docker-entrypoint-initdb.d"
   networks:
   - products-mysql-network

  users-microservice:
   image: users-microservice:latest
   environment:
     - ASPNETCORE_HTTP_PORTS=8080
     - ASPNETCORE_ENVIRONMENT=Development
     - POSTGRES_HOST=postgres-container
     - POSTGRES_PORT=5432
     - POSTGRES_DATABASE=eCommerceUsers
     - POSTGRES_USER=postgres 
     - POSTGRES_PASSWORD=test
   ports:
    - "5000:9090"
   networks:
     - users-postgres-network
     - ecommerce-network
   depends_on:
     - postgres-container

  postgres-container:
   image: postgres:18.1
   environment:
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=test
    - POSTGRES_DB=eCommerceUsers
   ports:
    - 5433:5432
   volumes:
    - "../79/users:/docker-entrypoint-initdb.d"
   networks:
    - users-postgres-network
    - ecommerce-network

  redis-container:
   image: redis:latest
   ports:
    - "6379:6379"
   volumes:
    - "../134/redis-cache:/data"
   networks:
    - ecommerce-network

  apigateway:
   image: apigateway
   build:
    context: .
    dockerfile: APiGateway/Dockerfile
   environment:
    - ASPNETCORE_HTTP_PORTS=8080
    - ASPNETCORE_ENVIRONMENT=Development
    - OrdersMicroserviceName=ordersmicroservice.api
    - OrdersMicroservicePort=7001
    - UsersMicroserviceName=users-microservice
    - UsersMicroservicePort=5000
    - ProductsMicroserviceName=products-microservice
    - ProductsMicroservicePort=6001
   ports:
    - "4000:8080"
   networks:
    - ecommerce-network
   depends_on:
    - ordersmicroservice.api
    - users-microservice
    - products-microservice

  rabbitmq-container:
   image: rabbitmq:4.2-management
   environment:
    - RABBITMQ_DEFAULT_USER=user
    - RABBITMQ_DEFAULT_PASS=password
   ports:
    - "5672:5672"
    - "15672:15672"
   networks:
    - ecommerce-network

networks:
 orders-mongodb-network:
  driver: bridge
 products-mysql-network:
  driver: bridge
 users-postgres-network:
  driver: bridge
 ecommerce-network:
  driver: bridge
